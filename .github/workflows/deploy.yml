name: Deploy Tiny Flowers to AWS EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to Server via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /home/ubuntu/TINY-FLOWERS
          
          # Fix quyền sở hữu TRƯỚC KHI chạy git reset để tránh lỗi Permission denied khi xóa file cũ
          sudo chown -R ubuntu:ubuntu .
          sudo chmod -R 777 mvc-project/storage mvc-project/bootstrap/cache || true
          
          # Hủy bỏ các thay đổi cục bộ (tránh lỗi overwrite) và cập nhật code mới nhất
          git fetch origin main
          git reset --hard origin/main
          
          cd mvc-project
          
          # Đảm bảo quyền 777 trước khi composer install
          sudo chmod -R 777 storage bootstrap/cache
          
          # Cài đặt dependencies (bỏ qua dev)
          composer install --no-dev --optimize-autoloader
          
          # Cấp lại quyền chuẩn (đảm bảo www-data có quyền đọc/ghi an toàn)
          sudo chown -R www-data:www-data storage bootstrap/cache public/images
          sudo chmod -R 775 storage bootstrap/cache public/images
          
          # Chạy migration (nếu có lỗi bảng tồn tại thì bỏ qua để không sập luồng)
          sudo -u www-data php artisan migrate --force || true
          
          # Tối ưu hóa cấu hình & dọn dẹp cache
          sudo -u www-data php artisan config:cache
          sudo -u www-data php artisan route:cache
          sudo -u www-data php artisan view:cache
          
          echo "🚀 Deployment successful!"
